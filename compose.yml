version: "3.9"

x-kafka-common: &kafka-common
  image: bitnamilegacy/kafka:3.4
  environment: &kafka-common-env
    KAFKA_ENABLE_KRAFT: "yes"
    KAFKA_CFG_PROCESS_ROLES: broker,controller
    KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
    KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093
    KAFKA_KRAFT_CLUSTER_ID: abcdefghijklmnopqrstuv
    KAFKA_CFG_LISTENERS: PLAINTEXT://:9091,SSL://:9092,CONTROLLER://:9093,EXTERNAL_SSL://:9094
    KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,SSL:SSL,EXTERNAL_SSL:SSL
    KAFKA_CFG_INTER_BROKER_LISTENER_NAME: SSL
    KAFKA_CFG_SSL_KEYSTORE_PASSWORD: keystore_password
    KAFKA_CFG_SSL_TRUSTSTORE_PASSWORD: truststore_password
    KAFKA_CFG_SSL_CLIENT_AUTH: none
    ALLOW_PLAINTEXT_LISTENER: "yes"
    KAFKA_CFG_AUTHORIZER_CLASS_NAME: org.apache.kafka.metadata.authorizer.StandardAuthorizer
    KAFKA_CFG_ALLOW_EVERYONE_IF_NO_ACL_FOUND: "false"
    KAFKA_CFG_SUPER_USERS: User:ANONYMOUS
  volumes:
    - ./infra/stores:/bitnami/kafka/config/certs
  healthcheck:
    test: ["CMD-SHELL", "kafka-broker-api-versions.sh --bootstrap-server localhost:9091 2>/dev/null || exit 1"]
    interval: 10s
    timeout: 5s
    retries: 5
    start_period: 30s

services:
  kafka-1:
    <<: *kafka-common
    ports:
      - "9094:9094"
    environment:
      <<: *kafka-common-env
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9091,SSL://kafka-1:9092,EXTERNAL_SSL://127.0.0.1:9094

  kafka-2:
    <<: *kafka-common
    ports:
      - "9095:9094"
    environment:
      <<: *kafka-common-env
      KAFKA_CFG_NODE_ID: "2"
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9091,SSL://kafka-2:9092,EXTERNAL_SSL://127.0.0.1:9095

  kafka-3:
    <<: *kafka-common
    ports:
      - "9096:9094"
    environment:
      <<: *kafka-common-env
      KAFKA_CFG_NODE_ID: "3"
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9091,SSL://kafka-3:9092,EXTERNAL_SSL://127.0.0.1:9096

  kafka-init:
    image: confluentinc/cp-kafka:latest
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
    volumes:
      - ./infra/kafka-init.sh:/kafka-init.sh:ro
      - ./infra/certs/ca.crt:/etc/kafka/certs/ca.crt:ro
      - ./infra/client.properties:/etc/kafka/client.properties:ro
    entrypoint: ["/bin/bash", "/kafka-init.sh"]

  practicum-service-1:
    build: .
    deploy:
    environment:
      - KAFKA_BOOTSTRAP=kafka-1:9092,kafka-2:9092,kafka-3:9092
      - KAFKA_SSL_CA_LOCATION=/etc/kafka/certs/ca.crt
      - KAFKA_TOPIC=topic-1
    volumes:
      - ./infra/certs/ca.crt:/etc/kafka/certs/ca.crt:ro
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully

  practicum-service-2:
    build: .
    deploy:
    environment:
      - KAFKA_BOOTSTRAP=kafka-1:9092,kafka-2:9092,kafka-3:9092
      - KAFKA_SSL_CA_LOCATION=/etc/kafka/certs/ca.crt
      - KAFKA_TOPIC=topic-2
    volumes:
      - ./infra/certs/ca.crt:/etc/kafka/certs/ca.crt:ro
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
